# ======================
# AcademiX - Configuración
# ======================

spring.application.name=academix

# --- Base de datos MySQL ---
spring.datasource.url=jdbc:mysql://localhost:3306/academix_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# --- Servidor ---
server.port=8080

# --- JWT ---
jwt.secret=QWNhZGVtaVhTZWNyZXRLZXkyMDI2UXVlRGViZVNlckxhcmdhUGFyYVNlclNlZ3VyYQ==
jwt.access-token-expiration=86400000
jwt.refresh-token-expiration=604800000

# --- Subida de archivos ---
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads

# --- Swagger ---
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
